services:
  - type: web
    name: railway-reservation-api
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DB_HOST
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        value: railway_reservation
      - key: JWT_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
